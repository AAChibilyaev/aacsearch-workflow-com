# CI/CD, полностью видимый из GitHub (в отличие от Workers Builds, чьи логи
# доступны только в дашборде Cloudflare).
#
# PR: сборка + клиентская валидация деплоя (dry-run) — секреты НЕ нужны.
# main: миграции удалённой D1 + wrangler deploy — нужны два секрета репозитория:
#   CLOUDFLARE_API_TOKEN  (права: Workers Scripts:Edit, D1:Edit)
#   CLOUDFLARE_ACCOUNT_ID
name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint (strict — fails on warnings)
        run: pnpm lint --max-warnings 0

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build worker artifact
        run: npm run build

      - name: Validate deploy bundle (dry run)
        run: pnpm exec wrangler deploy --dry-run --outdir /tmp/wrangler-dryrun

      - name: Report bundle size
        run: du -sh .open-next/worker.js .open-next | tail -2

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Без секретов деплой ПРОПУСКАЕТСЯ (job остаётся зелёным) — main не
      # должен быть красным из-за ещё не настроенных секретов репозитория.
      - name: Check deploy credentials
        id: creds
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Секреты CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID не заданы — деплой пропущен. Добавьте их в Settings → Secrets and variables → Actions, чтобы включить прод-деплой и миграции D1."
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.ok == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.creds.outputs.ok == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.ok == 'true'
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install (frozen lockfile)
        if: steps.creds.outputs.ok == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare secrets
        run: |
          missing=""
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then missing="$missing CLOUDFLARE_API_TOKEN"; fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then missing="$missing CLOUDFLARE_ACCOUNT_ID"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Add them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All Cloudflare secrets present"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations (payload migrate, remote bindings)
        if: steps.creds.outputs.ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYLOAD_SECRET: ci-migrate-placeholder
          NODE_ENV: production
        run: pnpm exec payload migrate

      - name: Build worker artifact
        if: steps.creds.outputs.ok == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Workers
        if: steps.creds.outputs.ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
